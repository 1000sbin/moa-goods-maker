name: 전체 플랫폼 자동 빌드 (Windows · macOS · Linux)

on:
  push:
    tags:
      - 'v*'          # v1.4.6 같은 태그를 올릴 때마다 빌드 + 릴리스
  workflow_dispatch:  # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write     # Release 업로드 권한

jobs:
  build:
    strategy:
      fail-fast: false   # 한 OS가 실패해도 나머지는 계속
      matrix:
        include:
          - os: windows-latest
            name: Windows
            cmd: npm run dist
            out: |
              dist/*.exe
              dist/latest.yml
              dist/*.blockmap
          - os: macos-latest
            name: macOS
            cmd: npm run dist:mac
            out: |
              dist/*.dmg
              dist/*.zip
          - os: ubuntu-latest
            name: Linux
            cmd: npm run dist:linux
            out: 'dist/*.AppImage'

    name: ${{ matrix.name }} 빌드
    runs-on: ${{ matrix.os }}

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 의존성 설치
        run: npm install

      - name: 빌드
        run: ${{ matrix.cmd }}
        env:
          # 맥 코드 서명 없이 빌드 (인증서 없어도 dmg 생성됨)
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 빌드 결과 확인
        shell: bash
        run: ls -la dist/

      - name: 아티팩트 업로드 (태그 없이 수동 실행 시)
        uses: actions/upload-artifact@v4
        with:
          name: moa-goods-maker-${{ matrix.name }}
          path: ${{ matrix.out }}
          if-no-files-found: warn

      - name: Release에 업로드 (태그 푸시 시)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ matrix.out }}
            ${{ matrix.name == 'Windows' && '모아굿즈메이커_단일파일.html' || '' }}
          generate_release_notes: true
          body: |
            ## 모아 굿즈메이커 ${{ github.ref_name }}

            ### 내려받기
            - **Windows**: `모아굿즈메이커-Setup-*.exe` (설치판) 또는 `모아굿즈메이커-portable-*.exe` (무설치)
            - **macOS**: `모아굿즈메이커-*.dmg` (Intel·Apple Silicon 공용)
            - **Linux**: `모아굿즈메이커-*.AppImage`
            - **웹 버전**: 아래 Assets의 `모아굿즈메이커_단일파일.html` — 브라우저로 바로 열기

            ### macOS 첫 실행 안내
            서명되지 않은 앱이라 처음엔 "확인되지 않은 개발자" 경고가 떠요.
            **응용 프로그램 폴더의 앱을 우클릭 → 열기 → 열기** 를 누르면 이후로는 그냥 실행돼요.
