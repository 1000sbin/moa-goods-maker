name: 전체 플랫폼 자동 빌드 (Windows · macOS · Linux)

on:
  push:
    tags:
      - 'v*'          # v1.4.6 같은 태그를 올릴 때마다 빌드 + 릴리스
  workflow_dispatch:  # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write     # Release 업로드 권한

jobs:
  build:
    strategy:
      fail-fast: false   # 한 OS가 실패해도 나머지는 계속
      matrix:
        include:
          - os: windows-latest
            name: Windows
            cmd: npm run dist
            out: |
              dist/*.exe
              dist/latest.yml
              dist/*.blockmap
          - os: macos-latest
            name: macOS
            cmd: npm run dist:mac
            out: |
              dist/*.dmg
              dist/*.zip
          - os: ubuntu-latest
            name: Linux
            cmd: npm run dist:linux
            out: 'dist/*.AppImage'

    name: ${{ matrix.name }} 빌드
    runs-on: ${{ matrix.os }}

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 의존성 설치
        run: npm install

      - name: 웹 단일파일 ASCII 사본 (깃허브가 한글 파일명을 지우는 문제 대응)
        if: matrix.name == 'Windows'
        shell: bash
        run: cp 모아굿즈메이커_단일파일.html MoaGoodsMaker-web.html

      - name: 애플 서명·공증 자격 준비 (맥 전용)
        if: matrix.name == 'macOS'
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/apple"
          printf '%s' "${{ secrets.APPLE_API_KEY }}" > "$RUNNER_TEMP/apple/AuthKey.p8"
          {
            echo "APPLE_API_KEY=$RUNNER_TEMP/apple/AuthKey.p8"
            echo "APPLE_API_KEY_ID=${{ secrets.APPLE_API_KEY_ID }}"
            echo "APPLE_API_ISSUER=${{ secrets.APPLE_API_ISSUER }}"
            echo "CSC_LINK=${{ secrets.CSC_LINK }}"
            echo "CSC_KEY_PASSWORD=${{ secrets.CSC_KEY_PASSWORD }}"
          } >> "$GITHUB_ENV"
          echo "자격 준비 완료 (값은 마스킹됨)"

      - name: 빌드
        run: ${{ matrix.cmd }}
        env:
          # 맥: package.json의 identity "-" 로 adhoc 전체 서명 (인증서 불필요)
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 빌드 결과 확인
        shell: bash
        run: ls -la dist/

      - name: 맥 서명·공증 검증
        if: matrix.name == 'macOS'
        shell: bash
        run: |
          for APP in dist/mac*/*.app; do
            [ -d "$APP" ] || continue
            echo "=== $APP ==="
            codesign --verify --deep --strict "$APP" && echo "  서명 검증 ✓" || { echo "★ 서명 검증 실패"; exit 1; }
            codesign -dv "$APP" 2>&1 | grep -E "Authority|TeamIdentifier" | head -3
            spctl --assess --type exec -vv "$APP" 2>&1 | head -2
            spctl --assess --type exec "$APP" && echo "  Gatekeeper 통과 (공증됨) ✓" || { echo "★ Gatekeeper 거부 — 공증 실패"; exit 1; }
          done

      - name: 맥 실행 스모크 테스트 (관찰용)
        if: matrix.name == 'macOS'
        continue-on-error: true
        shell: bash
        run: |
          APP=$(find dist -maxdepth 2 -name "*.app" -type d | head -1)
          BIN=$(find "$APP/Contents/MacOS" -type f | head -1)
          echo "러너 macOS: $(sw_vers -productVersion)"
          "$BIN" --no-sandbox > /tmp/smoke.log 2>&1 &
          PID=$!
          sleep 10
          if kill -0 $PID 2>/dev/null; then echo "★ 10초 생존 ✓"; kill $PID; else echo "즉시 종료 — 출력:"; cat /tmp/smoke.log; fi

      - name: 아티팩트 업로드 (태그 없이 수동 실행 시)
        uses: actions/upload-artifact@v4
        with:
          name: moa-goods-maker-${{ matrix.name }}
          path: ${{ matrix.out }}
          if-no-files-found: warn

      - name: Release에 업로드 (태그 푸시 시)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ matrix.out }}
            ${{ matrix.name == 'Windows' && 'MoaGoodsMaker-web.html' || '' }}
          generate_release_notes: true
          body: |
            ## 모아 굿즈메이커 ${{ github.ref_name }}

            ### 내려받기
            - **Windows**: `MoaGoodsMaker-Setup-*.exe` (설치판) 또는 `MoaGoodsMaker-portable-*.exe` (무설치)
            - **macOS**: 칩에 맞게 — Apple Silicon(M1~M4)은 `MoaGoodsMaker-*-arm64.dmg`, Intel 맥은 `MoaGoodsMaker-*-x64.dmg`
            - **Linux**: `MoaGoodsMaker-*.AppImage`
            - **웹 버전**: 아래 Assets의 `MoaGoodsMaker-web.html` — 브라우저로 바로 열기

            ### macOS 안내
            이 버전부터 **애플 공증(notarization)이 완료**된 앱이에요 — 받아서 바로 실행하면 돼요.
            (이전 버전의 실행 즉시 종료 문제도 함께 해결됐어요. 안 되면 웹 버전 `MoaGoodsMaker-web.html`이 항상 있어요.)
