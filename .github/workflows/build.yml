name: 전체 플랫폼 자동 빌드 (Windows · macOS · Linux)

on:
  push:
    tags:
      - 'v*'          # v1.4.6 같은 태그를 올릴 때마다 빌드 + 릴리스
  workflow_dispatch:  # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write     # Release 업로드 권한

jobs:
  build:
    strategy:
      fail-fast: false   # 한 OS가 실패해도 나머지는 계속
      matrix:
        include:
          - os: windows-latest
            name: Windows
            cmd: npm run dist
            out: |
              dist/*.exe
              dist/latest.yml
              dist/*.blockmap
          - os: macos-latest
            name: macOS
            cmd: npm run dist:mac
            out: |
              dist/*.dmg
              dist/*.zip
          - os: ubuntu-latest
            name: Linux
            cmd: npm run dist:linux
            out: 'dist/*.AppImage'

    name: ${{ matrix.name }} 빌드
    runs-on: ${{ matrix.os }}

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 의존성 설치
        run: npm install

      - name: 빌드
        run: ${{ matrix.cmd }}
        env:
          # 맥: package.json의 identity "-" 로 adhoc 전체 서명 (인증서 불필요)
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 빌드 결과 확인
        shell: bash
        run: ls -la dist/

      - name: 맥 서명 검증 (adhoc 전체 서명 확인)
        if: matrix.name == 'macOS'
        shell: bash
        run: |
          APP=$(find dist/mac-universal -maxdepth 1 -name "*.app" | head -1)
          echo "검사 대상: $APP"
          codesign -dv "$APP" 2>&1 || { echo "★ 서명 없음 — 실패"; exit 1; }
          # 두 아키텍처 모두 서명됐는지 (v1.4.9는 x86_64가 무서명이라 맥에서 즉시 종료됐음)
          BIN="$APP/Contents/MacOS/$(defaults read "$PWD/$APP/Contents/Info" CFBundleExecutable)"
          for ARCH in x86_64 arm64; do
            codesign -dv --arch=$ARCH "$BIN" 2>&1 && echo "  $ARCH 서명 ✓" || { echo "★ $ARCH 무서명 — 실패"; exit 1; }
          done

      - name: 아티팩트 업로드 (태그 없이 수동 실행 시)
        uses: actions/upload-artifact@v4
        with:
          name: moa-goods-maker-${{ matrix.name }}
          path: ${{ matrix.out }}
          if-no-files-found: warn

      - name: Release에 업로드 (태그 푸시 시)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ matrix.out }}
            ${{ matrix.name == 'Windows' && '모아굿즈메이커_단일파일.html' || '' }}
          generate_release_notes: true
          body: |
            ## 모아 굿즈메이커 ${{ github.ref_name }}

            ### 내려받기
            - **Windows**: `모아굿즈메이커-Setup-*.exe` (설치판) 또는 `모아굿즈메이커-portable-*.exe` (무설치)
            - **macOS**: `모아굿즈메이커-*.dmg` (Intel·Apple Silicon 공용)
            - **Linux**: `모아굿즈메이커-*.AppImage`
            - **웹 버전**: 아래 Assets의 `모아굿즈메이커_단일파일.html` — 브라우저로 바로 열기

            ### macOS 첫 실행 안내
            애플 인증서 없이 빌드된 앱이라 첫 실행이 막힐 수 있어요. 순서대로:
            1. 응용 프로그램 폴더의 앱을 **우클릭 → 열기 → 열기**
            2. 그래도 안 되면 **터미널에 이 한 줄**: `xattr -cr /Applications/모아\ 굿즈메이커.app`
            3. 그래도 안 되면 **웹 버전**(아래 html 파일)을 써주세요 — 기능이 완전히 같아요
