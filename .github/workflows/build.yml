name: 전체 플랫폼 자동 빌드 (Windows · macOS · Linux)

on:
  push:
    tags:
      - 'v*'          # v1.4.6 같은 태그를 올릴 때마다 빌드 + 릴리스
  workflow_dispatch:  # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write     # Release 업로드 권한

jobs:
  build:
    strategy:
      fail-fast: false   # 한 OS가 실패해도 나머지는 계속
      matrix:
        include:
          - os: windows-latest
            name: Windows
            cmd: npm run dist
            out: |
              dist/*.exe
              dist/latest.yml
              dist/*.blockmap
          - os: macos-latest
            name: macOS
            cmd: npm run dist:mac
            out: |
              dist/*.dmg
              dist/*.zip
          - os: ubuntu-latest
            name: Linux
            cmd: npm run dist:linux
            out: 'dist/*.AppImage'

    name: ${{ matrix.name }} 빌드
    runs-on: ${{ matrix.os }}

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 의존성 설치
        run: npm install

      - name: 웹 단일파일 ASCII 사본 (깃허브가 한글 파일명을 지우는 문제 대응)
        if: matrix.name == 'Windows'
        shell: bash
        run: cp 모아굿즈메이커_단일파일.html MoaGoodsMaker-web.html

      - name: 빌드
        run: ${{ matrix.cmd }}
        env:
          # 맥: identity null — Tahoe #49522 adhoc 재서명 크래시 우회 (무서명)
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 빌드 결과 확인
        shell: bash
        run: ls -la dist/

      - name: 맥 번들 검증 (무서명 — Tahoe #49522 우회)
        if: matrix.name == 'macOS'
        shell: bash
        run: |
          FOUND=0
          for APP in dist/mac*/*.app; do
            [ -d "$APP" ] || continue
            FOUND=1
            echo "=== 검사: $APP ==="
            test -f "$APP/Contents/MacOS/"* || { echo "★ 실행 파일 없음"; exit 1; }
            test -d "$APP/Contents/Frameworks/Electron Framework.framework" || { echo "★ Electron Framework 없음"; exit 1; }
            echo "  번들 구조 ✓ (무서명 — adhoc 재서명 시 macOS 26에서 SIGTRAP)"
          done
          [ "$FOUND" = "1" ] || { echo "★ 앱을 찾지 못함"; exit 1; }

      - name: 맥 실행 스모크 테스트 (시작 직후 SIGTRAP 방지)
        if: matrix.name == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          echo "macOS runner: $(sw_vers -productVersion) ($(uname -m))"
          APP=$(find dist/mac* -name "*.app" -type d | head -1)
          BIN=$(find "$APP/Contents/MacOS" -type f | head -1)
          echo "Launch: $BIN"
          "$BIN" &
          PID=$!
          for i in 1 2 3 4 5 6 7 8; do
            sleep 1
            if ! kill -0 "$PID" 2>/dev/null; then
              echo "★ $i초 만에 프로세스 종료 — ElectronMain/V8 SIGTRAP 가능"
              wait "$PID" || true
              exit 1
            fi
          done
          echo "  8초 실행 유지 ✓"
          kill "$PID" 2>/dev/null || true
          wait "$PID" 2>/dev/null || true

      - name: 아티팩트 업로드 (태그 없이 수동 실행 시)
        uses: actions/upload-artifact@v4
        with:
          name: moa-goods-maker-${{ matrix.name }}
          path: ${{ matrix.out }}
          if-no-files-found: warn

      - name: Release에 업로드 (태그 푸시 시)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ matrix.out }}
            ${{ matrix.name == 'Windows' && 'MoaGoodsMaker-web.html' || '' }}
          generate_release_notes: true
          body: |
            ## 모아 굿즈메이커 ${{ github.ref_name }}

            ### 내려받기
            - **Windows**: `MoaGoodsMaker-Setup-*.exe` (설치판) 또는 `MoaGoodsMaker-portable-*.exe` (무설치)
            - **macOS**: 칩에 맞게 — Apple Silicon(M1~M4)은 `MoaGoodsMaker-*-arm64.dmg`, Intel 맥은 `MoaGoodsMaker-*-x64.dmg`
            - **Linux**: `MoaGoodsMaker-*.AppImage`
            - **웹 버전**: 아래 Assets의 `MoaGoodsMaker-web.html` — 브라우저로 바로 열기

            ### macOS 첫 실행 안내
            macOS 26 (Tahoe)에서 electron-builder adhoc 서명 시 알려진 크래시([#49522](https://github.com/electron/electron/issues/49522))를 피하기 위해 **무서명**으로 배포해요. 첫 실행이 막히면:
            1. 응용 프로그램 폴더의 앱을 **우클릭 → 열기 → 열기**
            2. 그래도 안 되면 **터미널에 이 한 줄**: `xattr -cr /Applications/모아\ 굿즈메이커.app`
            3. 그래도 안 되면 **웹 버전**(아래 html 파일)을 써주세요 — 기능이 완전히 같아요
